<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Test Intelligence Platform</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="header">
    <h1>Test Intelligence Platform</h1>
</div>

<div class="container">

    <!-- Summary Cards -->

    <div class="cards">

        <div class="card">
            <h2>Total Executions</h2>
            <p id="executions"></p>
        </div>

        <div class="card">
            <h2>Passed</h2>
            <p id="passed"></p>
        </div>

        <div class="card">
            <h2>Failed</h2>
            <p id="failed"></p>
        </div>

        <div class="card">
            <h2>Skipped</h2>
            <p id="skipped"></p>
        </div>

        <div class="card">
            <h2>Pass %</h2>
            <p id="percentage"></p>
        </div>

    </div>

    <!-- Charts -->

    <div class="charts">

        <div class="chart-card pie-card">
            <h3>Execution Result Distribution</h3>
            <canvas id="pieChart"></canvas>
        </div>

        <div class="chart-card bar-card">
            <h3>Execution Trend</h3>
            <canvas id="barChart"></canvas>
        </div>

    </div>

    <!-- Table -->

	<div class="search-section">

	    <h2 class="table-title">
	        Execution History
	    </h2>

	    <input
	        type="text"
	        id="searchBox"
	        placeholder="🔍 Search execution..."
	    >

	</div>

    <table>

		<thead>
		<tr>

		    <th onclick="sortTable('executionName')">
		        Execution ▲▼
		    </th>

		    <th onclick="sortTable('totalTests')">
		        Total ▲▼
		    </th>

		    <th onclick="sortTable('passedTests')">
		        Passed ▲▼
		    </th>

		    <th onclick="sortTable('failedTests')">
		        Failed ▲▼
		    </th>

		    <th onclick="sortTable('skippedTests')">
		        Skipped ▲▼
		    </th>

		    <th onclick="sortTable('durationSeconds')">
		        Duration ▲▼
		    </th>

		</tr>
		</thead>

        <tbody id="history">

        </tbody>

    </table>
	
	<div class="pagination">

	    <button id="prevBtn">◀ Previous</button>

	    <span id="pageInfo"></span>

	    <button id="nextBtn">Next ▶</button>

	</div>

</div>

<script>
	
	let executionData = [];

	let filteredData = [];

	let currentSortColumn = "";

	let ascending = true;

	let currentPage = 1;

	const rowsPerPage = 5;

// Dashboard Summary

fetch("/api/executions/summary")
.then(res => res.json())
.then(data => {

    document.getElementById("executions").innerText = data.totalExecutions;

    document.getElementById("passed").innerText = data.totalPassed;

    document.getElementById("failed").innerText = data.totalFailed;

    document.getElementById("skipped").innerText = data.totalSkipped;

    document.getElementById("percentage").innerText =
        data.passPercentage.toFixed(2) + " %";

});

// Pie Chart

fetch("/api/executions/summary")
.then(res => res.json())
.then(data => {

    new Chart(document.getElementById("pieChart"), {

        type: "pie",

        data: {

            labels: ["Passed", "Failed", "Skipped"],

            datasets: [{

                data: [
                    data.totalPassed,
                    data.totalFailed,
                    data.totalSkipped
                ],

                backgroundColor: [
                    "#22c55e",
                    "#ef4444",
                    "#eab308"
                ]

            }]

        },

        options: {

            responsive: true,

            maintainAspectRatio: false,

            plugins: {

                legend: {

                    position: "top"

                }

            }

        }

    });

});

// Bar Chart

fetch("/api/executions")
.then(res => res.json())
.then(data => {

    const names = data.map(e => e.executionName);

    const passed = data.map(e => e.passedTests);

    new Chart(document.getElementById("barChart"), {

        type: "bar",

        data: {

            labels: names,

            datasets: [{

                label: "Passed Tests",

                data: passed,

                backgroundColor: "#2563eb"

            }]

        },

        options: {

            responsive: true,

            maintainAspectRatio: false,

            plugins: {

                legend: {

                    display: false

                }

            }

        }

    });

});

//------------------------------------------------------
// Execution Table + Search
//------------------------------------------------------


function renderTable(data){

    let rows="";

    if(data.length===0){

        rows=`
        <tr>
            <td colspan="6">
                No execution found
            </td>
        </tr>
        `;

    }else{

        data.forEach(item=>{

            rows+=`
            <tr>

                <td>${item.executionName}</td>

                <td>${item.totalTests}</td>

                <td>${item.passedTests}</td>

                <td>${item.failedTests}</td>

                <td>${item.skippedTests}</td>

                <td>${item.durationSeconds} sec</td>

            </tr>
            `;

        });

    }

    document.getElementById("history").innerHTML=rows;

}

function updateTable(){

    const start=(currentPage-1)*rowsPerPage;

    const end=start+rowsPerPage;

    const pageData=filteredData.slice(start,end);

    renderTable(pageData);

    updatePagination();

}

function updatePagination(){

    const totalPages=Math.ceil(filteredData.length/rowsPerPage) || 1;

    document.getElementById("pageInfo").innerText =
        `Page ${currentPage} of ${totalPages}`;

    document.getElementById("prevBtn").disabled =
        currentPage===1;

    document.getElementById("nextBtn").disabled =
        currentPage===totalPages;

}

fetch("/api/executions")

.then(res=>res.json())

.then(data=>{

	executionData=data;

	filteredData=[...executionData];

	updateTable();

});

document.getElementById("searchBox")

.addEventListener("keyup",function(){

    const keyword=this.value.toLowerCase();

    filteredData=executionData.filter(item=>

        item.executionName

        .toLowerCase()

        .includes(keyword)

    );

    currentPage=1;

    updateTable();

});



function sortTable(column){

    if(currentSortColumn === column){

        ascending = !ascending;

    }else{

        currentSortColumn = column;

        ascending = true;

    }

    executionData.sort((a,b)=>{

        let valueA = a[column];

        let valueB = b[column];

        if(typeof valueA === "string"){

            valueA = valueA.toLowerCase();

            valueB = valueB.toLowerCase();

        }

        if(valueA < valueB)
            return ascending ? -1 : 1;

        if(valueA > valueB)
            return ascending ? 1 : -1;

        return 0;

    });

	filteredData=[...executionData];

	currentPage=1;

	updateTable();

}

document.getElementById("prevBtn")

.addEventListener("click",()=>{

    if(currentPage>1){

        currentPage--;

        updateTable();

    }

});

document.getElementById("nextBtn")

.addEventListener("click",()=>{

    const totalPages=Math.ceil(filteredData.length/rowsPerPage);

    if(currentPage<totalPages){

        currentPage++;

        updateTable();

    }

});

</script>

</body>

</html>
